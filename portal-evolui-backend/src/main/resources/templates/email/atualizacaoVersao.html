<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title th:text="${dto.title}">Title</title>
    <style>
        @font-face {
            font-family: 'Poppins';
            font-style: normal;
            font-weight: 400;
            src: url('https://fonts.gstatic.com/s/poppins/v20/pxiEyp8kv8JHgFVrJJfedw.woff2') format('woff2');
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 0;
        }

        p, h1, h2, h3, h4, h5, span, small {
            font-family: 'Poppins', sans-serif;
        }

        small {
            color: #222 !important;
        }

        h2 {
            font-weight: 600;
            font-size: 20px;
        }

        h3 {
            font-weight: 500;
        }

        table {
            width: 100%;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0;
        }

        .header {
            width: 100%;
        }

        .info-box {
            background-color: #f1eee9;
            padding: 20px;
            margin: -5px 0 20px 0;
            text-align: center;
        }

        .info-box h2 {
            color: #333333;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .info-box h3 {
            font-size: 20px;
        }

        .info-box p {
            margin: 5px 0;
            font-size: 14px;
            color: #333333;
        }

        .modules-section {
            margin-top: 20px;
        }

        .modules-section h3 {
            color: #333333;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .module-item {
            font-size: 14px;
            margin: 15px 0;
            display: flex;
            border-bottom: 1px solid #eee;
            padding: 0 0 15px 0;
        }

        .module-item span.name::before {
            margin-right: 8px;
        }

        .module-item span.name {
            font-weight: bold;
        }

        .module-item span.downloadLink {
            font-weight: bold;
            color: #1E96F7;
            text-decoration: underline;
        }

        .module-item span.version {
            font-style: italic;
            color: #7e7e7e;
            text-align: right;
        }

        span.status-success, span.status-failure{
            font-style: italic;
            font-weight: bold;
            text-align: right;
            text-transform: uppercase;
        }

        span.status-success {
            color: #28a745;
        }

        span.status-failure {
            color: #d90000;
        }

        .footer {
            background-color: #383838;
            color: white;
            text-align: center;
            padding: 15px 0;
            margin-top: 30px;
            font-weight: bold;
        }

        .btn-saiba-mais {
            display: inline-block;
            font-weight: 400;
            color: #fff !important;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            background-color: #28a745;
            border: 1px solid #28a745;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            line-height: 1.5;
            border-radius: 0.25rem;
            transition: background-color 0.15s ease-in-out, border-color 0.15s ease-in-out;
            text-decoration: none;
            margin: 10px;
        }

        .btn-saiba-mais:hover {
            background-color: #218838;
            border-color: #1e7e34;
        }
    </style>
</head>
<body>
<div class="container">
    <img src="https://www.evoluitecnologia.com.br/email/img/av-header.jpg" alt="Atualização de Versão" class="header" />

    <div class="info-box">
        <h2 th:text="${dto.title}">title</h2>
        <h3 th:if="${dto.conclusion == T(br.com.evolui.portalevolui.web.beans.enums.GithubActionConclusionEnum).success}"><strong><span class="status-success" th:text="'SITUAÇÃO: SUCESSO'">success</span></strong></h3>
        <h3 th:if="${dto.conclusion != T(br.com.evolui.portalevolui.web.beans.enums.GithubActionConclusionEnum).success}">
            <strong>
                <span th:if="${dto.conclusion == T(br.com.evolui.portalevolui.web.beans.enums.GithubActionConclusionEnum).failure}" class="status-failure" th:text="'SITUAÇÃO: FALHA'">failure</span>
                <span th:if="${dto.conclusion != T(br.com.evolui.portalevolui.web.beans.enums.GithubActionConclusionEnum).failure}" class="status" th:text="'SITUAÇÃO: ' + ${dto.conclusion}">conclusion</span>
            </strong>
        </h3>
        <p><strong>RESPONSÁVEL:</strong> <span th:text="${dto.author}">author</span></p>
        <p><strong>DATA INÍCIO:</strong> <span th:text="${dto.requestDate}">requestDate</span></p>
        <p><strong>DATA CONCLUSÃO:</strong> <span th:text="${dto.conclusionDate}">conclusionDate</span></p>
        <p><a class="btn-saiba-mais" th:if="${dto.link != null}" th:href="${dto.link}">Saiba mais</a></p>
    </div>

    <div class="modules-section" th:if="${dto.modules != null && dto.modules.size() > 0}">
        <h3>Módulos incluídos na atualização:</h3>
        <table>
            <tbody>
            <tr class="module-item" th:each="module,iter: ${dto.modules}">
                <td style="width: 33%">
                    ✔️
                    <span class="name" th:if="${module.downloadLink == null}" th:text="${module.name}"></span>
                    <span class="downloadLink" th:if="${module.downloadLink != null}">
                        <a th:text="${module.name}" th:href="${module.downloadLink}"></a>
                    </span>
                </td>
                <td style="width: 33%">
                    <span class="version" th:text="${module.version}"></span>
                </td>
                <td style="width: 34%">
                    <small class="message" th:text="${module.message}"></small>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="footer">
        EVOLUI TECNOLOGIA
    </div>
</div>
</body>
</html>
