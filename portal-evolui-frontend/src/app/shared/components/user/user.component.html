<ng-container *ngIf="user">

    <!-- Button -->
    <button
        mat-icon-button
        [matMenuTriggerFor]="userActions">
        <span class="relative">
            <img
                class="w-7 h-7 rounded-full"
                *ngIf="showAvatar && user.image"
                (error)="noImage()"
                [src]="user.image">
            <mat-icon
                class="text-4xl"
                *ngIf="!showAvatar || !user.image"
                fontSet="fas" fontIcon="fa-user-circle"></mat-icon>

        </span>
    </button>

<mat-menu
    [xPosition]="'before'"
    #userActions="matMenu">
    <button mat-menu-item>
        <span class="flex flex-col leading-none">
            <span>Signed in as</span>
            <span class="mt-1.5 text-md font-medium">{{user.name}}</span>
        </span>
    </button>
    <mat-divider class="my-2"></mat-divider>
    <button mat-menu-item (click)="navigate('/user-settings')">
        <mat-icon fontSet="fas" fontIcon="fa-wrench"></mat-icon>
        <span>Configurações</span>
    </button>
    <mat-divider class="my-2"></mat-divider>
    <button
        mat-menu-item
        (click)="signOut()">
        <mat-icon fontSet="fas" fontIcon="fa-sign-out-alt"></mat-icon>
        <span>Sign out</span>
    </button>
</mat-menu>


</ng-container>
