<div class="flex flex-col md:h-full md:overflow-hidden">
  <div class="flex-none px-2" *ngIf="showFastFilter === true">
    <mat-form-field class="fuse-mat-dense">
      <mat-label>Filtro Rápido</mat-label>
      <input matInput (keyup)="fastFilter($event)" placeholder="Filtro Rápido" #input>
    </mat-form-field>
  </div>
  <div class="flex-1 md:overflow-y-auto">
  <table #table *ngIf="target" mat-table matSort [dataSource]="dataSource" class="table-auto" (matSortChange)="announceSortChange($event)">

    <ng-container matColumnDef="buttons">
      <th mat-header-cell *matHeaderCellDef>
        <ng-container *ngIf="showActionsButtons === true">
          <div class="flex flex-row items-center">
            <button mat-icon-button aria-label="Add" (click)="add()" *ngIf="user.profile?.toString() === 'ROLE_SUPER' || user.profile?.toString() === 'ROLE_HYPER'">
              <mat-icon class="icon-size-5 text-action" fontSet="fas" fontIcon="fa-plus"></mat-icon>
            </button>
            <button mat-icon-button aria-label="Add" (click)="refresh()">
              <mat-icon class="icon-size-5 text-action" fontSet="fas" fontIcon="fa-sync"></mat-icon>
            </button>
          </div>

        </ng-container>
      </th>
      <td mat-cell *matCellDef="let model">
        <ng-container *ngIf="showActionsButtons === true">
          <div class="flex flex-row items-center">
            <button mat-icon-button aria-label="Edit" (click)="edit(model.id)" *ngIf="user.profile?.toString() === 'ROLE_SUPER' || user.profile?.toString() === 'ROLE_HYPER'">
              <mat-icon class="icon-size-5 text-action" fontSet="fas" fontIcon="fa-edit" matTooltip="Editar Versão"></mat-icon>
            </button>
          </div>
        </ng-container>
      </td>
    </ng-container>

    <!-- branch -->
    <ng-container matColumnDef="branch">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Branch </th>
      <td mat-cell *matCellDef="let model"> {{ model.branch }} </td>
    </ng-container>

    <!-- tag -->
    <ng-container matColumnDef="tag">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Tag </th>
      <td mat-cell *matCellDef="let model"> {{ model.tag }} </td>
    </ng-container>

    <!-- tag -->
    <ng-container matColumnDef="versionType">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Tipo </th>
      <td mat-cell *matCellDef="let model"> {{ model.versionType }} </td>
    </ng-container>

    <ng-container *ngFor="let module of target.modules">
      <ng-container [matColumnDef]="module.identifier">
        <th mat-header-cell *matHeaderCellDef > Versão {{module.title}} </th>
        <td mat-cell *matCellDef="let model"> <pre>{{getFormattedVersion(module.identifier, model)}}</pre></td>
      </ng-container>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <!-- Group header -->
    <ng-container matColumnDef="groupHeader">
      <td mat-cell [attr.colspan]="999" *matCellDef="let group"
          class="bg-gray-200 dark:bg-gray-700"
          style="border-left: 3px solid var(--fuse-primary-DEFAULT, #4f46e5)">
        <div class="flex flex-row items-center py-1">
          <button *ngIf="showActionsButtons === true && (user.profile?.toString() === 'ROLE_SUPER' || user.profile?.toString() === 'ROLE_HYPER')"
                  mat-icon-button aria-label="Delete" (click)="delete(group.branch); $event.stopPropagation()">
            <mat-icon class="icon-size-5 text-action-danger" fontSet="fas" fontIcon="fa-trash" matTooltip="Remover Versão"></mat-icon>
          </button>
          <span class="text-sm font-semibold uppercase tracking-wider text-gray-700 dark:text-gray-200">
            {{group.branch}}
          </span>
          <span class="ml-2 text-sm font-medium text-gray-500 dark:text-gray-400">
            ({{group.totalCounts}})
          </span>
        </div>
      </td>
    </ng-container>

    <tr mat-row *matRowDef="let row; columns: ['groupHeader']; when: isGroup;" (click)="groupHeaderClick(row)"> </tr>
  </table>
  </div>
</div>
