<div class="flex flex-col">
  <div class="px-2" *ngIf="showFastFilter === true">
    <mat-form-field class="fuse-mat-dense">
      <mat-label>Filtro Rápido</mat-label>
      <input matInput (keyup)="fastFilter($event)" placeholder="Filtro Rápido" #input>
    </mat-form-field>
  </div>
  <table #table *ngIf="target" mat-table matSort [dataSource]="dataSource" class="table-auto" (matSortChange)="announceSortChange($event)">

    <ng-container matColumnDef="buttons">
      <th mat-header-cell *matHeaderCellDef>
        <ng-container *ngIf="showActionsButtons === true">
          <div class="flex flex-row items-center">
            <button mat-icon-button aria-label="Add" (click)="add()">
              <mat-icon class="icon-size-5 text-blue-500" fontSet="fas" fontIcon="fa-plus" matTooltip="{{'Criar novo ambiente'}}"></mat-icon>
            </button>
            <button mat-icon-button aria-label="Add" (click)="refresh()">
              <mat-icon class="icon-size-5 text-blue-500" fontSet="fas" fontIcon="fa-sync"></mat-icon>
            </button>
          </div>

        </ng-container>
      </th>
      <td mat-cell *matCellDef="let model">
        <ng-container *ngIf="showActionsButtons === true">
          <div class="flex flex-row items-center">
            <button mat-icon-button aria-label="Edit" (click)="edit(model.id)" [disabled]="model.busy === true" matTooltip="Editar Ambiente">
              <mat-icon class="icon-size-5 text-blue-500" fontSet="fas" fontIcon="fa-edit"></mat-icon>
            </button>
            <button mat-icon-button aria-label="Delete" (click)="delete(model.id)" matTooltip="Remover Ambiente" [disabled]="model.busy === true">
              <mat-icon class="icon-size-5 text-red-500" fontSet="fas" fontIcon="fa-trash"></mat-icon>
            </button>
            <button mat-icon-button aria-label="Copy" (click)="copy(model.id)" matTooltip="Duplicar Ambiente">
              <mat-icon class="icon-size-5 text-gray-500" fontSet="fas" fontIcon="fa-copy"></mat-icon>
            </button>
          </div>
        </ng-container>
      </td>
    </ng-container>
    <!-- identifier -->
    <ng-container matColumnDef="tag">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Versão Corrente </th>
      <td mat-cell *matCellDef="let model"> {{ model.tag }} </td>
    </ng-container>
    <!-- identifier -->
    <ng-container matColumnDef="identifier">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Identificador </th>
      <td mat-cell *matCellDef="let model"> {{ model.identifier }} </td>
    </ng-container>
    <!-- description -->
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Descrição </th>
      <td mat-cell *matCellDef="let model"> {{ model.description }} </td>
    </ng-container>
    <!-- client -->
    <ng-container matColumnDef="client">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Cliente </th>
      <td mat-cell *matCellDef="let model"> {{ model.client.identifier }} </td>
    </ng-container>
    <ng-container *ngFor="let module of target.modules">
      <ng-container [matColumnDef]="module.identifier">
        <th mat-header-cell *matHeaderCellDef > Versão {{module.title}} </th>
        <td mat-cell *matCellDef="let model"> <pre>{{getFormattedVersion(module.identifier, model)}}</pre></td>
      </ng-container>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

</div>
