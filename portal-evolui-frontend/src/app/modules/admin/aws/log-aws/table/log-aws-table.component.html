<div class="flex flex-col md:h-full md:overflow-hidden">
  <div class="flex-none px-2" *ngIf="showFastFilter === true">
    <mat-form-field class="fuse-mat-dense">
      <mat-label>Filtro Rápido</mat-label>
      <input matInput (keyup)="fastFilter($event)" placeholder="Filtro Rápido" #input>
    </mat-form-field>
  </div>
  <div class="flex-1 md:overflow-y-auto">
  <table #table mat-table matSort [dataSource]="dataSource" class="table-auto" (matSortChange)="announceSortChange($event)">

    <ng-container matColumnDef="buttons">
      <th mat-header-cell *matHeaderCellDef>
        <ng-container *ngIf="showActionsButtons === true">
          <button mat-icon-button aria-label="Add" (click)="refresh()">
            <mat-icon class="icon-size-5 text-action" fontSet="fas" fontIcon="fa-sync"></mat-icon>
          </button>
        </ng-container>
      </th>

    </ng-container>

    <!-- id -->
    <!--
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
      <td mat-cell *matCellDef="let model"> {{ model.id }} </td>
    </ng-container>
    !-->
    <!-- image -->
    <ng-container matColumnDef="image">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> </th>
      <td mat-cell *matCellDef="let model">
        <div *ngIf="model.user.image"  class="flex w-16 h-16 items-center">
          <img (error)="clearImage(model)" [src]="model.user.image" class="max-w-full max-h-full rounded-full" />
        </div>

      </td>
    </ng-container>
    <!-- user -->
    <ng-container matColumnDef="user">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Usuário </th>
      <td mat-cell *matCellDef="let model"> {{ model.user.name }} </td>
    </ng-container>
    <!-- userEmail -->
    <ng-container matColumnDef="userEmail">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Email Usuário </th>
      <td mat-cell *matCellDef="let model"> {{ model.user.email }} </td>
    </ng-container>
    <!-- logDate -->
    <ng-container matColumnDef="logDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Data/Hora </th>
      <td mat-cell *matCellDef="let model"> {{ model.logDate | date: 'dd/MM/yyyy HH:mm:ss' }} </td>
    </ng-container>
    <!-- action -->
    <ng-container matColumnDef="action">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Ação </th>
      <td mat-cell *matCellDef="let model"> {{ model.actionType }} </td>
    </ng-container>
    <!-- instance -->
    <ng-container matColumnDef="instance">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Instância </th>
      <td mat-cell *matCellDef="let model"> <pre>{{ getJson(model) | json }}</pre> </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  </div>

</div>
