<div class="flex flex-col">
    <div class="px-2" *ngIf="showFastFilter === true">
        <mat-form-field class="fuse-mat-dense">
            <mat-label>Filtro Rápido</mat-label>
            <input matInput (keyup)="fastFilter($event)" placeholder="Filtro Rápido" #input>
        </mat-form-field>
    </div>
    <table #table mat-table matSort [dataSource]="dataSource" class="table-auto" (matSortChange)="announceSortChange($event)">

        <ng-container matColumnDef="buttons">
            <th mat-header-cell *matHeaderCellDef>
                <ng-container *ngIf="showActionsButtons === true">
                    <button mat-icon-button aria-label="Add" (click)="refresh()">
                        <mat-icon class="icon-size-5 text-blue-500" fontSet="fas" fontIcon="fa-sync"></mat-icon>
                    </button>
                </ng-container>
            </th>
            <td mat-cell *matCellDef="let model">
                <ng-container *ngIf="showActionsButtons === true">
                    <div class="flex flex-row items-center">
                        <button mat-icon-button aria-label="Deletar" *ngIf="model.instanceState === 'stopped'" (click)="start (model)" matTooltip="Iniciar EC2">
                          <mat-icon class="icon-size-5 text-green-500" fontSet="fas" fontIcon="fa-play"></mat-icon>
                        </button>
                        <button mat-icon-button aria-label="Deletar" *ngIf="model.instanceState === 'running'" (click)="stop (model)" matTooltip="Parar EC2">
                          <mat-icon class="icon-size-5 text-red-500" fontSet="fas" fontIcon="fa-stop"></mat-icon>
                        </button>
                        <button mat-icon-button aria-label="Deletar" *ngIf="model.instanceState === 'running'" (click)="reboot(model)" matTooltip="Reiniciar EC2">
                          <mat-icon class="icon-size-5 text-blue-500" fontSet="fas" fontIcon="fa-recycle"></mat-icon>
                        </button>
                    </div>
                </ng-container>

            </td>
        </ng-container>

        <!-- id -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
          <td mat-cell *matCellDef="let model"> {{ model.id }} </td>
        </ng-container>
        <!-- name -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Nome </th>
          <td mat-cell *matCellDef="let model"> {{ model.name }} </td>
        </ng-container>
        <!-- status -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
          <td mat-cell *matCellDef="let model" [ngClass]="model.instanceState === 'running' ? 'text-green-500' : (model.instanceState === 'stopped' ? 'text-red-500' : 'text-gray-500')"> {{ model.instanceState }} </td>
        </ng-container>
        <!-- os -->
        <ng-container matColumnDef="os">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Sist. Oper. </th>
          <td mat-cell *matCellDef="let model"> {{ model.os }} </td>
        </ng-container>
        <!-- privateIp -->
        <ng-container matColumnDef="privateIp">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> IP Privado </th>
          <td mat-cell *matCellDef="let model"> {{ model.privateIp }} </td>
        </ng-container>
        <!-- publicIp -->
        <ng-container matColumnDef="publicIp">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> IP Público </th>
          <td mat-cell *matCellDef="let model"> {{ model.publicIp }} </td>
        </ng-container>
        <!-- instanceType -->
        <ng-container matColumnDef="instanceType">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Tipo Instância </th>
          <td mat-cell *matCellDef="let model"> {{ model.instanceType }} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

</div>
