<div class="flex flex-col md:h-full md:overflow-hidden">
    <div class="flex-none px-2" *ngIf="showFastFilter === true">
        <mat-form-field class="fuse-mat-dense">
            <mat-label>Filtro Rápido</mat-label>
            <input matInput (keyup)="fastFilter($event)" placeholder="Filtro Rápido" #input>
        </mat-form-field>
    </div>
    <div dragScroll class="flex-1 overflow-x-auto md:overflow-y-auto table-scroll-container">
    <table #table mat-table matSort [dataSource]="dataSource" class="table-auto" (matSortChange)="announceSortChange($event)">

        <ng-container matColumnDef="buttons">
            <th mat-header-cell *matHeaderCellDef>
                <ng-container *ngIf="showActionsButtons === true">
                    <button mat-icon-button aria-label="Add" (click)="refresh()">
                        <mat-icon class="icon-size-5 text-action" fontSet="fas" fontIcon="fa-sync"></mat-icon>
                    </button>
                </ng-container>
            </th>
            <td mat-cell *matCellDef="let model">
                <div class="flex flex-row items-center">
                  <ng-container *ngIf="showActionsButtons === true && !model.busy">
                    <button mat-icon-button aria-label="Deletar" *ngIf="model.instanceState === 'stopped'" (click)="start (model)">
                      <mat-icon class="icon-size-5 text-status-success" fontSet="fas" fontIcon="fa-play"></mat-icon>
                    </button>
                    <button mat-icon-button aria-label="Deletar" *ngIf="model.instanceState === 'available'" (click)="stop (model)">
                      <mat-icon class="icon-size-5 text-action-danger" fontSet="fas" fontIcon="fa-stop"></mat-icon>
                    </button>
                  </ng-container>
                  <button mat-icon-button aria-label="Deletar" *ngIf="model.busy" matTooltip="RDS está ocupado fazendo backup ou restore">
                    <mat-icon class="icon-size-5 text-orange-500" fontSet="fas" fontIcon="fa-triangle-exclamation"></mat-icon>
                  </button>
                </div>
            </td>
        </ng-container>

        <!-- id -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
          <td mat-cell *matCellDef="let model"> {{ model.id }} </td>
        </ng-container>
        <!-- endpoint -->
        <ng-container matColumnDef="endpoint">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Endpoint </th>
          <td mat-cell *matCellDef="let model"> {{ model.endpoint }} </td>
        </ng-container>
        <!-- status -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
          <td mat-cell *matCellDef="let model" [ngClass]="model.instanceState === 'available' ? 'text-status-success' : (model.instanceState === 'stopped' ? 'text-status-error' : 'text-status-neutral')"> {{ model.instanceState }} </td>
        </ng-container>
        <!-- engine -->
        <ng-container matColumnDef="engine">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Tipo Banco </th>
          <td mat-cell *matCellDef="let model"> {{ model.engine }} </td>
        </ng-container>
        <!-- port -->
        <ng-container matColumnDef="port">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Porta </th>
          <td mat-cell *matCellDef="let model"> {{ model.port }} </td>
        </ng-container>
        <!-- dbName -->
        <ng-container matColumnDef="dbName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Nome do Banco </th>
          <td mat-cell *matCellDef="let model"> {{ model.dbName }} </td>
        </ng-container>
        <!-- publicIpAddress -->
        <ng-container matColumnDef="publicIpAddress">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> IP Privado </th>
          <td mat-cell *matCellDef="let model"> {{ model.privateIpAddress }} </td>
        </ng-container>
        <!-- privateIpAddress -->
        <ng-container matColumnDef="privateIpAddress">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> IP Público </th>
          <td mat-cell *matCellDef="let model"> {{ model.publicIpAddress }} </td>
        </ng-container>
        <!-- instanceType -->
        <ng-container matColumnDef="instanceType">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Tipo Instância </th>
          <td mat-cell *matCellDef="let model"> {{ model.instanceType }} </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (dblclick)="rowDoubleClicked(row, $event)" (click)="rowTapped(row, $event)"></tr>
    </table>
    </div>

</div>
