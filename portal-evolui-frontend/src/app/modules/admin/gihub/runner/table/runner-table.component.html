<div class="flex flex-col md:h-full md:overflow-hidden">
  <div class="flex-none px-2" *ngIf="showFastFilter === true">
    <mat-form-field class="fuse-mat-dense">
      <mat-label>Filtro Rápido</mat-label>
      <input matInput (keyup)="fastFilter($event)" placeholder="Filtro Rápido" #input>
    </mat-form-field>
  </div>
  <div class="flex-1 md:overflow-y-auto">
  <table #table mat-table matSort [dataSource]="dataSource" class="table-auto">

    <ng-container matColumnDef="buttons">
      <th mat-header-cell *matHeaderCellDef>
        <ng-container *ngIf="showActionsButtons === true">
          <div class="flex flex-row items-center">
            <ng-container *userAuthority="{auths: [PerfilUsuarioEnum.ROLE_SUPER, PerfilUsuarioEnum.ROLE_HYPER]}">
              <button mat-icon-button type="button" aria-label="Instalador runner" (click)="openRunnerInstaller()"
                      matTooltip="Instalar runner (assistente)">
                <mat-icon class="icon-size-5 text-action" fontSet="fas" fontIcon="fa-plus"></mat-icon>
              </button>
            </ng-container>
            <button mat-icon-button aria-label="Atualizar" (click)="refresh()">
              <mat-icon class="icon-size-5 text-action" fontSet="fas" fontIcon="fa-sync"></mat-icon>
            </button>
          </div>
        </ng-container>
      </th>
      <td mat-cell *matCellDef="let model">
        <ng-container *ngIf="showActionsButtons === true">
          <div class="flex flex-row items-center">
            <ng-container *userAuthority="{auths: [PerfilUsuarioEnum.ROLE_SUPER, PerfilUsuarioEnum.ROLE_HYPER]}">
              <button mat-icon-button type="button" aria-label="Remover runner" (click)="openRemoveRunner(model)"
                      matTooltip="Remover runner">
                <mat-icon class="icon-size-5 text-action-danger" fontSet="fas" fontIcon="fa-trash"></mat-icon>
              </button>
            </ng-container>
          </div>
        </ng-container>

      </td>
    </ng-container>

    <!-- id -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> ID </th>
      <td mat-cell *matCellDef="let model"> {{ model.id }} </td>
    </ng-container>
    <!-- name -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Nome </th>
      <td mat-cell *matCellDef="let model"> {{ model.name }} </td>
    </ng-container>
    <!-- os -->
    <ng-container matColumnDef="os">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> OS </th>
      <td mat-cell *matCellDef="let model"> {{ model.os }} </td>
    </ng-container>
    <!-- status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Status </th>
      <td mat-cell *matCellDef="let model" [ngClass]="(model.status === 'online') ? 'text-status-success' : 'text-status-error'"> {{ model.status }} </td>
    </ng-container>
    <!-- busy -->
    <ng-container matColumnDef="busy">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Ocupado </th>
      <td mat-cell *matCellDef="let model"> {{ model.busy }}</td>
    </ng-container>
    <!-- labels.name -->
    <ng-container matColumnDef="labels.name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header> Rótulo Customizado </th>
      <td mat-cell *matCellDef="let model"> {{ getRunnerLabel(model) }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  </div>

</div>
