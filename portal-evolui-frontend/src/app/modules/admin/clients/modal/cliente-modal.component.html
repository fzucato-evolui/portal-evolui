<div class="inset-0 w-full h-full flex flex-col min-w-0 md:overflow-y-auto relative">
  <!-- Header -->
  <div class="flex-none flex items-center justify-between px-4 py-2 border-b dark:border-gray-700 bg-card dark:bg-transparent">
    <h2 class="text-xl font-bold tracking-tight truncate">{{title}}</h2>
    <button mat-icon-button aria-label="close dialog" mat-dialog-close class="flex-shrink-0 -mr-1 scale-75">
      <mat-icon class="icon-size-4 text-action" fontSet="fas" fontIcon="fa-times"></mat-icon>
    </button>
  </div>

  <!-- Main -->
  <div
    class="flex-auto overflow-y-auto p-6"
    cdkScrollable>

    <div [formGroup]="formSave" class="divide-y-2 divide-black h-full max-h-full max-w-full overflow-x-auto md:overflow-auto">


      <div class="w-full mb-4">
        <div class="w-full my-2">
          <div class="text-xl">Cliente</div>
          <div class="text-secondary">Dados do cliente do produto.</div>

        </div>
        <div class="grid sm:grid-cols-6 gap-2 mt-4 mx-1">
          <div class="sm:col-span-1">
            <mat-form-field class="fuse-mat-no-subscript w-full">
              <mat-label>ID</mat-label>
              <mat-icon
                class="icon-size-5"
                fontSet="fas" fontIcon="fa-list-ol"
                matPrefix></mat-icon>
              <input
                readonly
                [formControlName]="'id'"
                matInput>
            </mat-form-field>
          </div>
          <!-- Identifier -->
          <div class="sm:col-span-5">
            <mat-form-field class="fuse-mat-no-subscript w-full">
              <mat-label>Identificador</mat-label>
              <mat-icon
                class="icon-size-5"
                fontSet="fas" fontIcon="fa-signature"
                matPrefix></mat-icon>
              <input
                class="uppercase"
                [required]="true"
                [patterns]="customPatterns" mask="I*"
                [formControlName]="'identifier'"
                matInput>
            </mat-form-field>
          </div>
          <!-- Description -->
          <div class="sm:col-span-6">
            <mat-form-field class="fuse-mat-no-subscript w-full">
              <mat-label>Descrição</mat-label>
              <mat-icon
                class="icon-size-5"
                fontSet="fas" fontIcon="fa-comment"
                matPrefix></mat-icon>
              <input
                [formControlName]="'description'"
                matInput>
            </mat-form-field>
          </div>
          <!-- keywords -->
          <div class="sm:col-span-6">
            <mat-form-field class="fuse-mat-no-subscript w-full">
              <mat-label>Palavras Chave (Termos Regex para cópia de arquivos e libs)</mat-label>
              <mat-chip-grid #chipGrid aria-label="Enter Keywords">
                <mat-chip-row *ngFor="let keyword of model.keywords"
                              (removed)="removeKeyword(keyword)">
                  {{keyword}}
                  <button matChipRemove [attr.aria-label]="'remove ' + keyword">
                    <mat-icon>cancel</mat-icon>
                  </button>
                </mat-chip-row>
                <input placeholder="Palavra Chave..."
                       [matChipInputFor]="chipGrid"
                       [matChipInputSeparatorKeyCodes]="separatorKeysCodes"
                       [matChipInputAddOnBlur]="addOnBlur"
                       (matChipInputTokenEnd)="addKeyword($event)"/>
              </mat-chip-grid>
            </mat-form-field>
          </div>

        </div>
        <!--
        <pre style="font-size: 1rem; white-space: pre-wrap;">{{ formSave.value | json}}</pre>
        !-->
      </div>


    </div>

    <div class="absolute bottom-0 right-0 z-50">

      <button
        class="mr-4 mb-4"
        [disabled]="canSave() === false"
        (click)="doSaving()"
        mat-flat-button
        type="button"
        [color]="'primary'">Salvar
      </button>
    </div>
  </div>

</div>
