<div class="flex flex-col">
    <div class="px-2" *ngIf="showFastFilter === true">
        <mat-form-field class="fuse-mat-dense">
            <mat-label>Filtro Rápido</mat-label>
            <input matInput (keyup)="fastFilter($event)" placeholder="Filtro Rápido" #input>
        </mat-form-field>
    </div>
    <table mat-table matSort [dataSource]="dataSource" class="table-auto" (matSortChange)="announceSortChange($event)">

        <ng-container matColumnDef="buttons">
            <th mat-header-cell *matHeaderCellDef>
                <ng-container *ngIf="showActionsButtons === true">
                    <button mat-icon-button aria-label="Add" (click)="adicionar()">
                        <mat-icon class="icon-size-5 text-blue-500" fontSet="fas" fontIcon="fa-plus"></mat-icon>
                    </button>
                </ng-container>
            </th>
            <td mat-cell *matCellDef="let model">
                <ng-container *ngIf="showActionsButtons === true">
                    <div class="flex flex-row-reverse items-center" *userAuthority="{biggerThan: model.profile}">
                        <button mat-icon-button aria-label="Deletar" (click)="delete (model)">
                            <mat-icon class="icon-size-5 text-red-500">delete</mat-icon>
                        </button>
                        <button mat-icon-button (click)="edit(model)"
                                aria-label="Deletar">
                            <mat-icon class="icon-size-5 text-blue-500">edit</mat-icon>
                        </button>
                    </div>
                </ng-container>
                <mat-checkbox *ngIf="multiple === true" (click)="$event.stopPropagation()"
                              (change)="$event ? selection.toggle(model) : null"
                              [checked]="selection.isSelected(model)">
                </mat-checkbox>
            </td>
        </ng-container>
        <!-- Imagem -->
        <ng-container matColumnDef="imagem">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> </th>
            <td mat-cell *matCellDef="let model" (click)="getRecord(model)">
                <div *ngIf="model.image"  class="flex w-16 h-16 items-center">
                    <img (error)="clearImage(model)" [src]="model.image" class="max-w-full max-h-full" />
                </div>

            </td>
        </ng-container>
        <!-- Imagem -->
        <ng-container matColumnDef="ativo">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> </th>
            <td mat-cell *matCellDef="let model" (click)="getRecord(model)">
                <mat-icon class="icon-size-5" [ngClass]="model.enabled === true ? 'text-green-500' : 'text-red-500'">
                    {{model.enabled === true ? 'check' : 'close'}}
                </mat-icon>
            </td>
        </ng-container>
        <!-- Codigo -->
        <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Código </th>
            <td mat-cell *matCellDef="let model" (click)="getRecord(model)"> {{ model.id }} </td>
        </ng-container>
        <!-- Perfil -->
        <ng-container matColumnDef="perfil">
            <th mat-header-cell *matHeaderCellDef mat-sort-header> Perfil </th>
            <td mat-cell *matCellDef="let model" (click)="getRecord(model)"> {{ model.profile }} </td>
        </ng-container>
        <!-- Nome -->
        <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nome</th>
            <td mat-cell *matCellDef="let model" (click)="getRecord(model)"> {{ model.name }} </td>
        </ng-container>
        <!-- Login -->
        <ng-container matColumnDef="login">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Login</th>
            <td mat-cell *matCellDef="let model" (click)="getRecord(model)"> {{ model.login }} </td>
        </ng-container>
        <!-- Email -->
        <ng-container matColumnDef="email">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
            <td mat-cell *matCellDef="let model" (click)="getRecord(model)"> {{ model.email }} </td>
        </ng-container>


        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

</div>
