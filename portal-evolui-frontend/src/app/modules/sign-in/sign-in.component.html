<div class="flex flex-col flex-auto items-center sm:justify-center sm:items-center min-w-0 h-screen">
  <div class="w-full sm:w-auto py-8 px-4 sm:p-12 sm:rounded-2xl sm:shadow bg-gray-100">
    <div class="w-full max-w-80 sm:w-80 mx-auto sm:mx-0">
      <!-- Logo -->
      <div class="w-12">
        <img src="assets/images/logo/logo.svg">
      </div>

      <!-- Title -->
      <div class="mt-8 text-4xl font-extrabold tracking-tight leading-tight">Faça o Login</div>
      <!-- Sign in form -->
      <form
        class="mt-8"
        [formGroup]="signInForm"
        #signInNgForm="ngForm">

        <!-- Email field -->
        <mat-form-field class="w-full mb-2">
          <mat-label>Login</mat-label>
          <input
            id="email"
            matInput
            [formControlName]="'login'">
          <mat-error *ngIf="signInForm.get('login').hasError('required')">
            Login é obrigatório
          </mat-error>

        </mat-form-field>

        <!-- Password field -->
        <mat-form-field class="w-full mb-2">
          <mat-label>Senha</mat-label>
          <input
            id="password"
            matInput
            type="password"
            [formControlName]="'password'"
            #passwordField>
          <button
            mat-icon-button
            type="button"
            (click)="passwordField.type === 'password' ? passwordField.type = 'text' : passwordField.type = 'password'"
            matSuffix>
            <mat-icon
              class="icon-size-5"
              *ngIf="passwordField.type === 'password'"
              fontSet="fas" fontIcon="fa-eye"></mat-icon>
            <mat-icon
              class="icon-size-5"
              *ngIf="passwordField.type === 'text'"
              fontSet="fas" fontIcon="fa-eye-slash"></mat-icon>
          </button>
          <mat-error>
            Senha é obrigatória
          </mat-error>
        </mat-form-field>


        <!-- Submit button -->
        <button
          class="fuse-mat-button-large w-full mt-6"
          mat-flat-button
          [color]="'primary'"
          [disabled]="signInForm.disabled"
          (click)="signIn()">
                    <span *ngIf="!signInForm.disabled">
                        Entrar
                    </span>
          <mat-progress-spinner
            *ngIf="signInForm.disabled"
            [diameter]="24"
            [mode]="'indeterminate'"></mat-progress-spinner>
        </button>

        <ng-container *ngIf="enableSocialMedia === true">
          <!-- Separator -->
          <div class="flex items-center mt-8">
            <div class="flex-auto mt-px border-t"></div>
            <div class="mx-2 text-secondary">{{'login.ouFacaLoginCom' | transloco}}</div>
            <div class="flex-auto mt-px border-t"></div>
          </div>
          <!-- Single sign-on buttons -->
          <div class="mt-8 space-x-4 flex flex-col flex-auto items-center justify-center">

            <div class="flex-auto" #gbutton></div>


          </div>
        </ng-container>
      </form>
    </div>
  </div>
</div>
